name: Expo Screenshots

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  screenshots:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Expo CLI
        run: pnpm add -g expo-cli

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Seed test data
        run: |
          # Run the task seeder to generate test data
          node scripts/seed-tasks.js
          
          # Create CI setup file
          node scripts/ci-setup.js

      - name: Generate screenshots
        run: |
          # Start Expo web in background
          pnpm run web &
          EXPO_PID=$!

          # Wait for Expo to start
          echo "Waiting for Expo to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8081 > /dev/null; then
              echo "Expo is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          # Take enhanced screenshots
          node scripts/take-screenshots-enhanced.js

          # Kill Expo process
          kill $EXPO_PID || true

      - name: Upload screenshots to branch
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create a unique folder for this PR's screenshots
          PR_FOLDER="pr-${{ github.event.pull_request.number }}"
          
          # Fetch or create the screenshots branch
          git fetch origin gh-screenshots 2>/dev/null || true
          
          # Switch to screenshots branch (create if doesn't exist)
          if git show-ref --verify --quiet refs/remotes/origin/gh-screenshots; then
            git checkout gh-screenshots
            git pull origin gh-screenshots
          else
            git checkout --orphan gh-screenshots
            # Clean the branch
            git rm -rf . 2>/dev/null || true
            echo "# Screenshots Branch" > README.md
            echo "This branch stores screenshots for pull requests." >> README.md
            git add README.md
            git commit -m "Initialize screenshots branch"
          fi
          
          # Create PR folder and copy screenshots
          mkdir -p "$PR_FOLDER"
          cp -r screenshots/* "$PR_FOLDER/" 2>/dev/null || true
          
          # Add and commit
          git add "$PR_FOLDER"
          git commit -m "Update screenshots for PR #${{ github.event.pull_request.number }}" || echo "No changes to commit"
          
          # Push to origin
          git push origin gh-screenshots || git push --set-upstream origin gh-screenshots

      - name: Comment PR with screenshots
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Get list of screenshots
            const screenshotsDir = 'screenshots';
            const screenshots = fs.readdirSync(screenshotsDir)
              .filter(file => file.endsWith('.png'))
              .sort(); // Sort to ensure consistent order

            if (screenshots.length === 0) {
              console.log('No screenshots found');
              return;
            }

            // Base URL for raw GitHub content
            const baseUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/gh-screenshots/pr-${context.issue.number}`;

            // Create comment body with smaller thumbnails in a grid
            let comment = '## 📱 Expo App Screenshots\n\n';
            comment += 'Generated screenshots from the latest changes:\n\n';
            
            // Create a grid layout for thumbnails
            comment += '<table>\n<tr>\n';
            
            let colCount = 0;
            screenshots.forEach((screenshot, index) => {
              const screenshotUrl = `${baseUrl}/${screenshot}`;
              const title = screenshot.replace('.png', '')
                .replace(/^\d+-/, '') // Remove number prefix
                .replace(/-/g, ' ')
                .replace(/\b\w/g, l => l.toUpperCase()); // Title case
              
              // Start new row every 3 images
              if (colCount === 3) {
                comment += '</tr>\n<tr>\n';
                colCount = 0;
              }
              
              comment += '<td align="center">\n';
              comment += `<b>${title}</b><br>\n`;
              comment += `<a href="${screenshotUrl}" target="_blank">`;
              comment += `<img src="${screenshotUrl}" alt="${title}" width="200">`;
              comment += `</a>\n`;
              comment += '</td>\n';
              
              colCount++;
            });
            
            // Close the table
            comment += '</tr>\n</table>\n\n';
            
            // Add specific section for snooze action sheet if it exists
            const snoozeScreenshot = screenshots.find(s => s.includes('snooze-action-sheet'));
            if (snoozeScreenshot) {
              comment += '### 🕐 Snooze Options\n\n';
              comment += 'The app supports multiple snooze durations:\n';
              comment += '- **Tomorrow**: Snooze until 9 AM tomorrow\n';
              comment += '- **This Weekend**: Snooze until the weekend\n';
              comment += '- **Next Workday**: Snooze until the next workday\n';
              comment += '- **Whenever**: Indefinite snooze\n\n';
              
              const snoozeUrl = `${baseUrl}/${snoozeScreenshot}`;
              comment += `<a href="${snoozeUrl}" target="_blank">`;
              comment += `<img src="${snoozeUrl}" alt="Snooze Action Sheet" width="300">`;
              comment += `</a>\n\n`;
            }

            // Add footer with timestamp and details
            const timestamp = new Date().toISOString();
            comment += `\n---\n`;
            comment += `*Screenshots generated automatically by GitHub Actions at ${timestamp}*\n`;
            comment += `*${screenshots.length} screenshots captured with seeded test data*`;

            // Check if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('📱 Expo App Screenshots')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }