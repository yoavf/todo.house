name: EAS Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build for'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: 'Build profile'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          packager: pnpm
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🔄 Generate npm lockfile for EAS
        run: |
          # Remove pnpm artifacts that confuse EAS
          rm -f pnpm-lock.yaml
          rm -f .npmrc
          # Generate npm lockfile
          npm install --package-lock-only
          git add package-lock.json
          echo "Generated package-lock.json for EAS Build"

      - name: 🚀 Build on EAS
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PLATFORM="${{ github.event.inputs.platform }}"
            PROFILE="${{ github.event.inputs.profile }}"
          else
            PLATFORM="all"
            PROFILE="development"
          fi

          eas build --platform $PLATFORM --profile $PROFILE --non-interactive

      - name: 📱 Get build URLs
        run: |
          echo "### Build Status 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [Expo dashboard](https://expo.dev/accounts/yoavfr/projects/todohouse/builds) for build progress and download links." >> $GITHUB_STEP_SUMMARY