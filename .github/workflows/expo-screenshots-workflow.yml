name: Expo Screenshots

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  screenshots:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Expo CLI
        run: pnpm add -g expo-cli

      - name: Generate screenshots
        run: |
          # Start Expo web in background
          pnpm run web &
          EXPO_PID=$!

          # Wait for Expo to start
          sleep 30

          # Install Playwright for screenshots
          npx playwright install chromium

          # Take screenshots using Playwright
          node scripts/take-screenshots.js

          # Kill Expo process
          kill $EXPO_PID || true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: expo-screenshots
          path: screenshots/

      - name: Comment PR with screenshots
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Get list of screenshots
            const screenshotsDir = 'screenshots';
            const screenshots = fs.readdirSync(screenshotsDir)
              .filter(file => file.endsWith('.png'));

            if (screenshots.length === 0) {
              console.log('No screenshots found');
              return;
            }

            // Create comment body
            let comment = '## 📱 Expo App Screenshots\n\n';
            comment += 'Generated screenshots from the latest changes:\n\n';

            // Add each screenshot
            screenshots.forEach((screenshot, index) => {
              const screenshotPath = path.join(screenshotsDir, screenshot);
              const screenshotData = fs.readFileSync(screenshotPath, 'base64');
              comment += `### ${screenshot.replace('.png', '').replace(/-/g, ' ')}\n`;
              comment += `![${screenshot}](data:image/png;base64,${screenshotData})\n\n`;
            });

            // Add footer
            comment += '\n---\n*Screenshots generated automatically by GitHub Actions*';

            // Post comment
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });