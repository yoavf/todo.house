name: Cleanup Screenshots on PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    # Only run if the PR was merged
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout gh-screenshots branch
        uses: actions/checkout@v4
        with:
          ref: gh-screenshots
          fetch-depth: 0

      - name: Delete PR screenshots folder
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get PR number
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_FOLDER="pr-${PR_NUMBER}"

          # Check if the PR folder exists
          if [ -d "$PR_FOLDER" ]; then
            echo "Deleting screenshots for PR #${PR_NUMBER}"

            # Remove the entire PR folder
            rm -rf "$PR_FOLDER"

            # Commit the deletion
            git add -A
            git commit -m "Clean up screenshots for merged PR #${PR_NUMBER}" || echo "No changes to commit"

            # Push changes
            git push origin gh-screenshots

            echo "Successfully deleted screenshots folder: $PR_FOLDER"
          else
            echo "No screenshots folder found for PR #${PR_NUMBER}"
          fi

      - name: Delete PR comment with screenshots
        uses: actions/github-script@v7
        with:
          script: |
            // Get all comments on the PR
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // Find the bot comment with screenshots
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('📱 Expo App Screenshots')
            );

            if (botComment) {
              console.log(`Found screenshot comment (ID: ${botComment.id}), deleting...`);

              await github.rest.issues.deleteComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              console.log('Successfully deleted screenshot comment');
            } else {
              console.log('No screenshot comment found to delete');
            }